AWSTemplateFormatVersion: '2010-09-09'
Description: PROJET-1 - Base RDS PostgreSQL privee (db.t4g.micro)

Parameters:
  EnvironmentName:
    Type: String
    Default: projet1
  DBName:
    Type: String
    Default: mydb
  DBUsername:
    Type: String
    Default: postgres
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Mot de passe de la base (saisi au deploiement, jamais en clair dans le fichier)

Resources:

  # Groupe de sous-reseaux prives ou placer la base
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Sous-reseaux prives pour RDS
      SubnetIds:
        - !ImportValue
          Fn::Sub: ${EnvironmentName}-PrivateSubnet1Id
        - !ImportValue
          Fn::Sub: ${EnvironmentName}-PrivateSubnet2Id
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-db-subnet-group
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

  # Instance RDS PostgreSQL (privee, non accessible depuis internet)
  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      Engine: postgres  # RDS prend la version PostgreSQL par defaut si on ne la precise pas
      DBInstanceClass: db.t4g.micro

      AllocatedStorage: '20'
      StorageType: gp3
      DBName: !Ref DBName
      MasterUsername: !Ref DBUsername
      MasterUserPassword: !Ref DBPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !ImportValue
          Fn::Sub: ${EnvironmentName}-RDSSecurityGroupId
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 1
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-rds
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

Outputs:
  RDSEndpointAddress:
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub ${EnvironmentName}-RDSEndpointAddress
  RDSEndpointPort:
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub ${EnvironmentName}-RDSEndpointPort
  DBName:
    Value: !Ref DBName
    Export:
      Name: !Sub ${EnvironmentName}-DBName
