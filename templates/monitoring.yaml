AWSTemplateFormatVersion: '2010-09-09'
Description: PROJET-1 - CloudWatch - logs de l'app et alarmes (CPU et status check)

Parameters:
  EnvironmentName:
    Type: String
    Default: projet1

Resources:

  # Log group ou l'agent CloudWatch envoie les logs de l'app Flask
  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /${EnvironmentName}/app
      RetentionInDays: 14
      Tags:
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

  # Alarme d'alerte : CPU tres eleve sur l'ASG (visible dans CloudWatch)
  HighCpuAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-monitor-cpu
      AlarmDescription: CPU moyen de l ASG superieur a 80%
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !ImportValue
            Fn::Sub: ${EnvironmentName}-AutoScalingGroupName
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Tags:
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

  # Alarme : une instance echoue son status check EC2
  StatusCheckAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-status-check
      AlarmDescription: Une instance de l ASG echoue son status check
      Namespace: AWS/EC2
      MetricName: StatusCheckFailed
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !ImportValue
            Fn::Sub: ${EnvironmentName}-AutoScalingGroupName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Tags:
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

Outputs:
  AppLogGroupName:
    Value: !Ref AppLogGroup
    Export:
      Name: !Sub ${EnvironmentName}-AppLogGroupName
