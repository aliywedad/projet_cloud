AWSTemplateFormatVersion: '2010-09-09'
Description: PROJET-1 - ALB + Auto Scaling Group EC2 (t3.micro) qui execute l'app Flask CRUD

Parameters:
  EnvironmentName:
    Type: String
    Default: projet1
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
  GitRepoUrl:
    Type: String
    Default: https://github.com/aliywedad/projet_cloud.git
    Description: URL du repo GitHub qui contient le dossier app/
  DBUsername:
    Type: String
    Default: postgres
  DBPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Doit etre le meme mot de passe que celui du stack RDS

Resources:

  # Role IAM pour les EC2 (SSM pour la connexion + agent CloudWatch pour les logs)
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${EnvironmentName}-ec2
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Tags:
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # Modele des instances EC2 (type t3.micro obligatoire)
  MyLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub ${EnvironmentName}-lt
      # tags sur le launch template lui-meme
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: Name
              Value: !Sub ${EnvironmentName}-lt
            - Key: supnum:Lab
              Value: Project-1
            - Key: supnum:Group
              Value: GROUP-22053-22086-22014-25240
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t3.micro
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - !ImportValue
            Fn::Sub: ${EnvironmentName}-EC2SecurityGroupId
        # tags sur les instances et les volumes crees par le launch template
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub ${EnvironmentName}-app
              - Key: supnum:Lab
                Value: Project-1
              - Key: supnum:Group
                Value: GROUP-22053-22086-22014-25240
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: !Sub ${EnvironmentName}-app-volume
              - Key: supnum:Lab
                Value: Project-1
              - Key: supnum:Group
                Value: GROUP-22053-22086-22014-25240
        UserData:
          Fn::Base64:
            Fn::Sub:
              - |
                #!/bin/bash -xe
                dnf update -y
                dnf install -y python3 python3-pip git amazon-cloudwatch-agent

                git clone "${GitRepoUrl}" /opt/repo
                cd /opt/repo/app
                pip3 install -r requirements.txt

                mkdir -p /var/log/flaskapp

                cat > /etc/systemd/system/flaskapp.service <<SERVICE
                [Unit]
                Description=Flask CRUD app (PROJET-1)
                After=network.target

                [Service]
                Type=simple
                WorkingDirectory=/opt/repo/app
                Environment=DB_ENGINE=postgres
                Environment=DB_HOST=${DbHost}
                Environment=DB_PORT=${DbPort}
                Environment=DB_NAME=${DbName}
                Environment=DB_USER=${DBUsername}
                Environment=DB_PASSWORD=${DBPassword}
                StandardOutput=append:/var/log/flaskapp/app.log
                StandardError=append:/var/log/flaskapp/app.log
                ExecStart=/usr/bin/python3 -m gunicorn -b 0.0.0.0:5000 app:app
                Restart=always
                RestartSec=5

                [Install]
                WantedBy=multi-user.target
                SERVICE

                systemctl daemon-reload
                systemctl enable flaskapp
                systemctl start flaskapp

                cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<CWAGENT
                {
                  "logs": {
                    "logs_collected": {
                      "files": {
                        "collect_list": [
                          {
                            "file_path": "/var/log/flaskapp/app.log",
                            "log_group_name": "/${EnvironmentName}/app",
                            "log_stream_name": "{instance_id}"
                          }
                        ]
                      }
                    }
                  }
                }
                CWAGENT

                /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
                  -a fetch-config -m ec2 -s \
                  -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
              - DbHost: !ImportValue
                  Fn::Sub: ${EnvironmentName}-RDSEndpointAddress
                DbPort: !ImportValue
                  Fn::Sub: ${EnvironmentName}-RDSEndpointPort
                DbName: !ImportValue
                  Fn::Sub: ${EnvironmentName}-DBName

  # Application Load Balancer (dans les sous-reseaux publics)
  MyALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !ImportValue
          Fn::Sub: ${EnvironmentName}-PublicSubnet1Id
        - !ImportValue
          Fn::Sub: ${EnvironmentName}-PublicSubnet2Id
      SecurityGroups:
        - !ImportValue
          Fn::Sub: ${EnvironmentName}-ALBSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-alb
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

  # Target Group avec health check sur /health
  MyTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${EnvironmentName}-tg
      VpcId: !ImportValue
        Fn::Sub: ${EnvironmentName}-VpcId
      Port: 5000
      Protocol: HTTP
      TargetType: instance
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-tg
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref MyALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref MyTargetGroup

  # Auto Scaling Group (instances dans les sous-reseaux prives, min 2 / max 4)
  MyAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub ${EnvironmentName}-asg
      VPCZoneIdentifier:
        - !ImportValue
          Fn::Sub: ${EnvironmentName}-PrivateSubnet1Id
        - !ImportValue
          Fn::Sub: ${EnvironmentName}-PrivateSubnet2Id
      LaunchTemplate:
        LaunchTemplateId: !Ref MyLaunchTemplate
        Version: !GetAtt MyLaunchTemplate.LatestVersionNumber
      MinSize: 2
      MaxSize: 4
      DesiredCapacity: 2
      TargetGroupARNs:
        - !Ref MyTargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 120
      Tags:
        - Key: Name
          Value: !Sub ${EnvironmentName}-app
          PropagateAtLaunch: true
        - Key: supnum:Lab
          Value: Project-1
          PropagateAtLaunch: true
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240
          PropagateAtLaunch: true

  # Politique : ajoute 1 instance quand le CPU est trop haut
  ScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref MyAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: 1
      Cooldown: 300

  # Politique : enleve 1 instance quand le CPU est bas
  ScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref MyAutoScalingGroup
      PolicyType: SimpleScaling
      AdjustmentType: ChangeInCapacity
      ScalingAdjustment: -1
      Cooldown: 300

  # Alarme CPU > 70% -> declenche le scale out
  CPUHighAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-cpu-high
      AlarmDescription: CPU moyen de l ASG superieur a 70%
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref MyAutoScalingGroup
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 70
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref ScaleOutPolicy
      Tags:
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

  # Alarme CPU < 30% -> declenche le scale in
  CPULowAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${EnvironmentName}-cpu-low
      AlarmDescription: CPU moyen de l ASG inferieur a 30%
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref MyAutoScalingGroup
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 30
      ComparisonOperator: LessThanThreshold
      AlarmActions:
        - !Ref ScaleInPolicy
      Tags:
        - Key: supnum:Lab
          Value: Project-1
        - Key: supnum:Group
          Value: GROUP-22053-22086-22014-25240

Outputs:
  ALBDNSName:
    Value: !GetAtt MyALB.DNSName
    Export:
      Name: !Sub ${EnvironmentName}-ALBDNSName
  AutoScalingGroupName:
    Value: !Ref MyAutoScalingGroup
    Export:
      Name: !Sub ${EnvironmentName}-AutoScalingGroupName
